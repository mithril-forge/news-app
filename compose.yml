# Compose file used for local development

services:
  postgres:
    container_name: news-app-postgres
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    env_file:
      - envs/common_dev.env

  redis:
    container_name: news-app-redis
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes
    env_file:
      - envs/common_dev.env

  mailserver:
    container_name: news-app-mailserver
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    hostname: mail.localhost
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
    volumes:
      - mailserver_data:/var/mail/
      - mailserver_state:/var/mail-state/
      - mailserver_logs:/var/log/mail/
      - mailserver_config:/tmp/docker-mailserver/
    environment:
      - ENABLE_RSPAMD=1
      - ENABLE_CLAMAV=0  # Disabled for development (uses less resources)
      - ENABLE_FAIL2BAN=0  # Disabled for development
      - LOG_LEVEL=debug
      - PERMIT_DOCKER=container  # Allow other containers to send mail
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    healthcheck:
      test: "ss --listening --tcp | grep -P 'LISTEN.+:smtp' || exit 1"
      timeout: 3s
      retries: 3
      interval: 30s

  backend:
    container_name: news-app-backend
    ports:
      - "8000:8000"
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint:
      - /entrypoint_backend.sh
    command: "uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailserver:
        condition: service_started
    env_file:
      - envs/common_dev.env

  dramatiq:
    container_name: news-app-dramatiq
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint:
      - /entrypoint_dramatiq.sh
    command: "dramatiq dramatiq_tasks --processes 2"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailserver:
        condition: service_started
    env_file:
      - envs/common_dev.env

  frontend:
    container_name: news-app-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    env_file:
      - envs/common_dev.env

volumes:
  postgres_data:
  redis_data:
  mailserver_data:
  mailserver_state:
  mailserver_logs:
  mailserver_config: