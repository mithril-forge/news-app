# Compose file used for local development

services:
  postgres:
    container_name: news-app-postgres
    image: postgres:17
    ports:
      - "50010:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    env_file:
      - envs/common_dev.env
      - .env

  redis:
    container_name: news-app-redis
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes
    env_file:
      - envs/common_dev.env
      - .env
  backend:
    container_name: news-app-backend
    ports:
      - "8000:8000"
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint:
      - /entrypoint_backend.sh
    command: "uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - envs/common_dev.env
      - .env
  dramatiq:
    container_name: news-app-dramatiq
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint:
      - /entrypoint_dramatiq.sh
    command: "dramatiq dramatiq_tasks --processes 2"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - envs/common_dev.env
      - .env
  frontend:
    container_name: news-app-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    env_file:
      - envs/common_dev.env
      - .env

volumes:
  postgres_data:
  redis_data:
