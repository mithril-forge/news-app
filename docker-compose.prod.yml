version: '3.8'

services:
  postgres:
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password

  backend:
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    ports:
      - "8000:8000"
    env_file:
      - envs/common_prod.env
    secrets:
      - gemini_api_key

  frontend:
    deploy:
      replicas: 2
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        order: start-first
    ports:
      - "3000:3000"
    env_file:
      - envs/common_prod.env

networks:
  app_network:
    driver: overlay

secrets:
  db_password:
    external: true
  gemini_api_key:
    external: true