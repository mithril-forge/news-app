
# Compose file used for production deployment

services:
  postgres:
    extends:
      file: compose.base.yml
      service: postgres
    env_file:
      - envs/common_prod.env
      - .env

  backend:
    extends:
      file: compose.base.yml
      service: backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - envs/common_prod.env
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=http://185.215.165.121:8000
    extends:
      file: compose.base.yml
      service: frontend
    depends_on:
      - backend
    env_file:
      - envs/common_prod.env
      - .env

  caddy:
    container_name: news-app-caddy
    image: caddy:2-alpine
    ports:
      - "80:80"
      # - "443:443"  # Uncomment when using domain with HTTPS
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
