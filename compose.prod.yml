# Compose file used for production deployment

services:
  postgres:
    extends:
      file: compose.base.yml
      service: postgres
    env_file:
      - envs/common_prod.env
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  backend:
    extends:
      file: compose.base.yml
      service: backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - envs/common_prod.env
    environment:
      - GEMINI_API_KEY_FILE=/run/secrets/gemini_api_key
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - gemini_api_key
      - db_password
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=http://185.215.165.121:8000
    extends:
      file: compose.base.yml
      service: frontend
    depends_on:
      - backend
    env_file:
      - envs/common_prod.env
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      # - "443:443"  # Uncomment when using domain with HTTPS
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

secrets:
  db_password:
    external: true
  gemini_api_key:
    external: true

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  default:
    driver: overlay
    attachable: true