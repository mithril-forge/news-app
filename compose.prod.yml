# Compose file used for production deployment on Dokploy
# NOTE: Redis and Postgres services are not defined here as they are managed by Dokploy.

networks:
  dokploy-network:
    external: true

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint:
      - /entrypoint_backend.sh
    command: "uvicorn main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - .env
    networks:
      - dokploy-network

  dramatiq:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint:
      - /entrypoint_dramatiq.sh
    command: "dramatiq dramatiq_tasks --processes 2"
    depends_on:
      backend:
        condition: service_started
    env_file:
      - .env
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_CONTAINER_API_URL=${NEXT_PUBLIC_CONTAINER_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    networks:
      - dokploy-network
