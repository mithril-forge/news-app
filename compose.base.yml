# Docker Compose Base file
# Services defined in this compose apply to both development and production environments.

services:
  postgres:
    container_name: news-app-postgres
    image: postgres:17
    volumes:
      - postgres_data_news_app:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    ports:
      - "5432:5432"
  redis:
    container_name: news-app-redis
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
  backend:
    container_name: news-app-backend
    ports:
      - "8000:8000"
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint:
      - /entrypoint_backend.sh
    command: "uvicorn main:app --host 0.0.0.0 --port 8000"
  dramatiq:
    container_name: dramatiq-parsing
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint:
      - /entrypoint_dramatiq.sh
    command: "dramatiq dramatiq_tasks --processes 2"
  frontend:
    container_name: news-app-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
